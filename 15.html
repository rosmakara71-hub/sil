<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសាប្រឡងតេស្តសមត្ថភាព៖ សីលធម៌ និងពុទ្ធសាសនា (សីល៥)</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root { --primary: #273746; --accent: #7d6608; --success: #27ae60; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.7; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--accent); padding-bottom: 15px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #fcf3cf; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .student-info div { display: flex; flex-direction: column; }
        .student-info label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; background: #fff; border-radius: 8px; }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 1.05em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 4px; }
        .options label:hover { background: #fcf3cf; }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #219150; }
        .feedback { margin-top: 15px; padding: 15px; display: none; border-radius: 6px; font-size: 0.95em; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { text-align: center; margin-top: 30px; font-weight: bold; font-size: 1.4em; color: var(--primary); padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 វិញ្ញាសាតេស្ត៖ ចេតសិក<br>បង្កើតដោយgemini</h1>

    <div class="student-info">
        <div>
            <label for="sName">ឈ្មោះសិស្ស៖</label>
            <input type="text" id="sName" placeholder="តើអ្នកឈ្មោះអ្វី?">
        </div>
        <div>
            <label for="sClass">ថ្នាក់រៀន៖</label>
            <input type="text" id="sClass" placeholder="រៀននៅថ្នាក់ណា">
        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">បញ្ជូនវិញ្ញាសា និងពិនិត្យលទ្ធផល</button>
    <div id="summary"></div>
</div>

<script>
    // សំណួរអំពី៖ សីលរបស់គ្រហស្ថ
    const questions =[

    "opt": ["មានៈ", "លោភៈ", "ទិដ្ឋិ", "ឆន្ទៈ"],
    "ans": "លោភៈ",
    "exp": "«លោភចេតសិក» គឺតួចំណង់ ឬសេចក្តីលោភលន់ (Greed/Attachment) វាធ្វើមុខងារតោងស្អិតក្នុងអារម្មណ៍ មិនព្រមលះបង់ ដែលជាប្រភពនៃទុក្ខទាំងពួង។"
  },
  {
    "q": "សភាវៈដែល «យល់ខុសពីតថភាពពិត យល់ថាមានតួខ្លួន មានងួនពិតប្រាកដ ឬបុណ្យបាបគ្មានផល» ត្រូវនឹងអកុសលចេតសិកណា?",
    "opt": ["មោហៈ", "មានៈ", "ទិដ្ឋិ", "វិចិកិច្ឆា"],
    "ans": "ទិដ្ឋិ",
    "exp": "«ទិដ្ឋិចេតសិក» ក្នុងទីនេះសំដៅលើ មិច្ឆាទិដ្ឋិ (Wrong view) គឺការយល់ខុសលំអៀងចាកសច្ចធម៌ ដូចជាការយល់ថាគ្មានបរលោក ឬគ្មានកម្មផលជាដើម។"
  },
  {
    "q": "តើចេតសិកមួយណាដែលមានមុខងារ «ទប់ទល់នឹងកុក្កុច្ចៈ (សេចក្តីក្តៅក្រហាយស្តាយក្រោយ)» ធ្វើឱ្យចិត្ត និងចេតសិកគូកនស្ងប់រំងាប់ខ្សឹកខ្សួល?",
    "opt": ["កាយបស្សទ្ធិ និងចិត្តបស្សទ្ធិ", "កាយលហុតា និងចិត្តលហុតា", "កាយមុទុតា និងចិត្តមុទុតា", "កាយឧជុកតា និងចិត្តឧជុកតា"],
    "ans": "កាយបស្សទ្ធិ និងចិត្តបស្សទ្ធិ",

  },
  {
    "q": "តើ «អឡោភចេតសិក» (សេចក្តីមិនលោភ) កាលណាមានកម្លាំងពេញបរិបូណ៌ នឹងបង្ហាញខ្លួនជាគុណធម៌កំពូលមួយណា?",

    "ans": "ការលះបង់ ទានបរិច្ចាគ ឬចាគៈ",
    "exp": "«អឡោភៈ» មានលក្ខណៈមិនចង់បាន មិនតោងស្អិត។ ផលលេចចេញ (បច្ចុបដ្ឋាន) របស់វាគឺការមិនរវើរវាយចង់បានទ្រព្យគេ និងសម្តែងចេញជាសភាវៈសប្បុរស ហ៊ានលះបង់ធ្វើទាន។"
  },
  {

    "opt": ["ព្រោះវាជាចេតសិកល្អខ្លាំង", "ព្រោះសភាពងងឹតវង្វេង សង្ស័យលើព្រះរតនត្រ័យយ៉ាងជ្រៅ មានលក្ខណៈពិសេសដាច់ដោយឡែក មិនអាចផ្សំជាមួយអកុសលចិត្តដទៃដែលកំពុងលោភឬខឹងបានឡើយ", "ព្រោះវាកើតជាមួយបញ្ញា", "ព្រោះវាជារបស់ព្រះអរហន្ត"],
    "ans": "ព្រោះសភាពងងឹតវង្វេង សង្ស័យលើព្រះរតនត្រ័យយ៉ាងជ្រៅ មានលក្ខណៈពិសេសដាច់ដោយឡែក មិនអាចផ្សំជាមួយអកុសលចិត្តដទៃដែលកំពុងលោភឬខឹងបានឡើយ",
    "exp": "វិចិកិច្ឆា (Doubt) មានសភាពរារែក ជ្រប់ចុះក្នុងមន្ទិលសង្ស័យលើផ្លូវធម៌។ សភាវៈបែបនេះកើតបានតែក្នុងមោហមូលចិត្តដួងទី១ ដែលគ្មាន លោភៈ ឬទោសៈ ចូលមកលាយឡំនោះទេ។"
  },
  {
    "q": "តើចេតសិកមួយណាដែលធ្វើតួនាទី «ប៉ះពាល់ ឬរងខ្ទប់» រវាងចិត្ត វិញ្ញាណវិថី និងអារម្មណ៍ខាងក្រៅ ជាទ្វារដំបូងបង្អស់នៃដំរិះ?",
    "opt": ["វេទនា", "សញ្ញា", "ផស្សៈ", "ចេតនា"],
    "ans": "ផស្សៈ",
    "exp": "«ផស្សចេតសិក» (Contact) គឺការប៉ះខ្ទប់នៃធម៌ ៣ យ៉ាងគឺ អាយតនៈខាងក្នុង អាយតនៈខាងក្រៅ និងវិញ្ញាណ។ បើគ្មានផស្សៈជាអ្នកបើកឆាកទេ វេទនាក៏កើតឡើងសោយរសមិនបានដែរ។"

  {
    "q": "តើ «អប្បមញ្ញាចេតសិក ២» (ករុណានិងមុទិតា) មានលក្ខណៈកើតឡើងរួមគ្នា (សម្បយោគ) បែបណា?",
    "opt": ["ត្រូវតែកើតឡើងព្រមគ្នានៅក្នុងចិត្តតែមួយជានិច្ច", "កើតមិនព្រមគ្នាទេ ព្រោះអារម្មណ៍របស់វាផ្ទុយគ្នា (ករុណាចាប់អារម្មណ៍សត្វមានទុក្ខ ឯមុទិតាចាប់អារម្មណ៍សត្វមានសុខ)", "មិនដែលកើតក្នុងកុសលចិត្តទាល់តែសោះ", "កើតបានតែក្នុងចិត្តថ្នាក់ទាប"],
    "ans": "កើតមិនព្រមគ្នាទេ ព្រោះអារម្មណ៍របស់វាផ្ទុយគ្នា (ករុណាចាប់អារម្មណ៍សត្វមានទុក្ខ ឯមុទិតាចាប់អារម្មណ៍សត្វមានសុខ)",

  {

    "opt": ["មិនមានអ្វីខុសគ្នាទេ ជាពាក្យដូចគ្នា", "លោភៈជាចំណង់បែបកិលេសតោងស្អិត ចំណែកឆន្ទៈជាបំណងប្រាថ្នាចង់ធ្វើ (មានលក្ខណៈជាកណ្តាល កើតបានទាំងបុណ្យនិងបាប)", "ឆន្ទៈជាសេចក្តីខឹងក្រោធ ឯលោភៈជាសេចក្តីស្រឡាញ់", "លោភៈកើតតែក្នុងចិត្តព្រះអរហន្ត"],
    "ans": "លោភៈជាចំណង់បែបកិលេសតោងស្អិត ចំណែកឆន្ទៈជាបំណងប្រាថ្នាចង់ធ្វើ (មានលក្ខណៈជាកណ្តាល កើតបានទាំងបុណ្យនិងបាប)",
    "exp": "«ឆន្ទៈ» (Desire to act) ប្រៀបដូចជាការលូកដៃទៅចាប់យកអារម្មណ៍ បើចង់ធ្វើបុណ្យហៅថា កុសលច្ឆន្ទៈ បើចង់ធ្វើបាបហៅថា អកុសលច្ឆន្ទៈ។ ឯ «លោភៈ» គឺតោងស្អិតដោយកិលេសតែម្យ៉ាង។"

    // មុខងារសម្រាប់ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // ១. ធ្វើការ Shuffle លំដាប់លំហាត់
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // ២. ធ្វើការ Shuffle លំដាប់ជម្រើសចម្លើយនៅក្នុងសំណួរនីមួយៗ
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">សំណួរទី ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // មុខងារកែពិន្ទុ និងបង្ហាញដំណោះស្រាយ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់រៀនរបស់សិស្សជាមុនសិន!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "✅ <b>ត្រឹមត្រូវ!</b> ដំណោះស្រាយ៖ " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "❌ <b>មិនត្រឹមត្រូវទេ!</b> ចម្លើយដែលត្រូវគឺ៖ " + item.ans + "<br>💡 <b>ការពន្យល់៖</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `🎓 បេក្ខជន៖ ${name} | ថ្នាក់៖ ${sClass} <br> 📊 លទ្ធផលទទួលបាន៖ ${score} / ${shuffledQuestions.length} សំណួរ (ចំណាត់ថ្នាក់៖ ${Math.round((score/shuffledQuestions.length)*100)}%)
        <div class="action-links">
                <a href="https://rosmakara71-hub.github.io/sil/" target="_blank" class="btn-link btn-home">🌐 ត្រឡប់ទៅទំព័រដើម</a>
                <a href="https://rosmakara71-hub.github.io/sil/16" target="_blank" class="btn-link btn-next">➡️ ធ្វើកម្រងសំណួរបន្ទាប់</a>
            </div>
        `;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

    "exp": "бһҖбһ¶бһҡбһҠбһ¶бһ…бҹӢбһҹбһёбһӣбһ‘бһёбҹҘ (бһӮбҹ’бһҡбһҝбһ„бһҹбҹ’бһҡбһңбһ№бһ„) бһӮбһәбһҮбһ¶бһҠбһҫбһҳбһ бҹҒбһҸбһ»бһ…бһҳбҹ’бһ”бһ„бһҠбҹӮбһӣбһҖбһ¶бһҸбҹӢбһ•бҹ’бһҸбһ¶бһ…бҹӢбһҹбҹ’бһҳбһ¶бһҡбһҸбһё бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһ”бһ»бһӮбҹ’бһӮбһӣбһ“бҹ„бҹҮбһ‘бҹ…бһ”бҹ’бһҡбһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһҒбһ»бһҹ бһ¬бһ”бҹҶбһ–бһ¶бһ“бһҹбһёбһӣбһҠбһ‘бҹғбһ‘бҹҖбһҸ (бһҠбһјбһ…бһҮбһ¶бһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһӮбҹ’бһҡбҹ„бҹҮбһҗбҹ’бһ“бһ¶бһҖбҹӢбһҠбһӣбҹӢбһҮбһёбһңбһ·бһҸбһўбҹ’бһ“бһҖбһҠбһ‘бҹғ) бһҠбҹ„бһҷбһўбһ…бҹҒбһҸбһ“бһ¶ бһ¬бһҠбҹ„бһҷбһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһ”бҹ’бһҡбһҳбһ¶бһ‘бҹ”"
  },
  {
    "q": "бһҸбһҫбһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһҫбһҸ В«бһӮбһҺбһ“бһёбһҖбҹ’бһӣбҹӮбһ„бһҖбҹ’бһӣбһ¶бһҷ (Fake Account)В» бһҠбһҫбһҳбҹ’бһ”бһёбһ‘бҹ…бһ”бҹ„бһҖбһ”бҹ’бһҡбһ¶бһҹбҹӢбһӣбһ»бһҷбһҖбһ¶бһҖбҹӢ бһ¬бһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹбһӮбҹҒбһҸбһ¶бһҳбһўбҹҠбһёбһ“бһ’бһәбһҺбһ·бһҸ бһҒбһ»бһҹбһҹбһёбһӣбһ’бһҳбҹҢбһҸбҹ’бһҡбһ„бҹӢбһҺбһ¶бһҒбҹ’бһӣбҹҮ?",
    "opt": ["бһҒбһ»бһҹбһҸбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҡбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бһ‘бҹҶбһ“бһҫбһ”бһ–бҹҒбһҖ", "бһҒбһ»бһҹбһҹбһ·бһҖбҹ’бһҒбһ¶бһ”бһ‘бһ‘бһёбҹў (бһўбһ‘бһ·бһ“бҹ’бһ“бһ¶бһ‘бһ¶бһ“бһ¶-бһҖбһ¶бһҡбһ”бҹ„бһҖбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бҹ’бһҡбһ–бҹ’бһҷ) бһ“бһ·бһ„бһҹбһ·бһҖбҹ’бһҒбһ¶бһ”бһ‘бһ‘бһёбҹӨ (бһҳбһ»бһҹбһ¶бһңбһ¶бһ‘бһ¶-бһҖбһ¶бһҡбһҖбһ»бһ бһҖбһ—бһјбһҸбһ—бһҡ)", "бһҳбһ·бһ“бһҒбһ»бһҹбһ‘бҹҒ бһ–бҹ’бһҡбҹ„бҹҮбһ’бҹ’бһңбһҫбһЎбһҫбһ„бһ“бҹ…бһӣбһҫбһ–бһ·бһ—бһ–бһ бҹ’бһңбҹҒбһҹбһ”бҹҠбһ»бһҖ (Virtual World)", "бһҒбһ»бһҹбһҸбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҡбһҳбһ·бһ“бһ”бһ¶бһ“бһ”бһ„бҹӢбһҗбҹ’бһӣбҹғбһҹбҹҒбһңбһ¶бһўбҹҠбһёбһ“бһ’бһәбһҺбһ·бһҸ"],
    "ans": "бһҒбһ»бһҹбһҹбһ·бһҖбҹ’бһҒбһ¶бһ”бһ‘бһ‘бһёбҹў (бһўбһ‘бһ·бһ“бҹ’бһ“бһ¶бһ‘бһ¶бһ“бһ¶-бһҖбһ¶бһҡбһ”бҹ„бһҖбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бҹ’бһҡбһ–бҹ’бһҷ) бһ“бһ·бһ„бһҹбһ·бһҖбҹ’бһҒбһ¶бһ”бһ‘бһ‘бһёбҹӨ (бһҳбһ»бһҹбһ¶бһңбһ¶бһ‘бһ¶-бһҖбһ¶бһҡбһҖбһ»бһ бһҖбһ—бһјбһҸбһ—бһҡ)",
    "exp": "бһ”бһ…бҹ’бһ…бҹҒбһҖбһңбһ·бһ‘бҹ’бһҷбһ¶бһӮбҹ’бһҡбһ¶бһ“бҹӢбһҸбҹӮбһҮбһ¶бһ§бһ”бһҖбһҡбһҺбҹҚбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҷбһҫбһ„бһ”бҹ’бһҡбһҫбһңбһ¶бһҠбһҫбһҳбҹ’бһ”бһёбһ—бһјбһҸбһ—бһҡ (бһҳбһ»бһҹбһ¶) бһ“бһ·бһ„бһ”бҹ„бһҖбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҷбһҖбһ‘бҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһўбҹ’бһ“бһҖбһҠбһ‘бҹғ (бһўбһ‘бһ·бһ“бҹ’бһ“бһ¶бһ‘бһ¶бһ“) бһ“бҹ„бҹҮбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһҖбһҳбҹ’бһҳбһ•бһӣбһӮбһәбһҸбҹ’бһҡбһјбһңбһҡбһ¶бһ”бҹӢбһҗбһ¶бһ”бҹҶбһ–бһ¶бһ“бһҹбһёбһӣбһ‘бһ¶бҹҶбһ„бһҹбҹ’бһҡбһ»бһ„бҹ”"
  },
  {
    "q": "бһҸбһҫбһ–бһ¶бһҖбҹ’бһҷбһҗбһ¶ В«бһ”бһүбҹ’бһ…бһҹбһёбһӣВ» бһҳбһ¶бһ“бһ“бҹҗбһҷбһ”бһҖбһ”бҹ’бһҡбҹӮбһ…бҹҶбһҮбһ¶бһ—бһ¶бһҹбһ¶бһҒбҹ’бһҳбҹӮбһҡбһҗбһ¶бһҠбһјбһ…бһҳбҹ’бһҸбҹҒбһ…?",
    "opt": ["бһ…бҹ’бһ”бһ¶бһ”бҹӢбһ‘бһ¶бҹҶбһ„бһЎбһ¶бһҷбһҡбһ”бһҹбҹӢбһҡбһҠбҹ’бһӢ", "бһҹбһёбһӣбҹҘ бһ¬бһҖбһ¶бһҡбһҡбһҖбҹ’бһҹбһ¶бһңбһ·бһ“бҹҗбһҷбһ’бһҳбҹҢ бҹҘ бһҷбҹүбһ¶бһ„", "бһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһ”бһ»бһҺбҹ’бһҷбһ‘бһ¶бһ“бҹҘбһҠбһ„бһҖбҹ’бһ“бһ»бһ„бһҳбһҪбһҷбһҶбҹ’бһ“бһ¶бҹҶ", "бһҖбһ¶бһҡбһҹбһјбһҸбҹ’бһҡбһ’бһҳбҹҢбһҗбҹ’бһңбһ¶бһҷбһ–бҹ’бһҡбҹҮбҹҘбһ…бһ”бҹӢ"],
    "ans": "бһҹбһёбһӣбҹҘ бһ¬бһҖбһ¶бһҡбһҡбһҖбҹ’бһҹбһ¶бһңбһ·бһ“бҹҗбһҷбһ’бһҳбҹҢ бҹҘ бһҷбҹүбһ¶бһ„",
    "exp": "В«бһ”бһүбҹ’бһ…В» бһ”бҹ’бһҡбҹӮбһҗбһ¶ бһ”бҹ’бһҡбһ¶бҹҶ (бҹҘ), В«бһҹбһёбһӣВ» бһ”бҹ’бһҡбҹӮбһҗбһ¶ бһңбһ·бһ“бҹҗбһҷ бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҡбҹҖбһ”бһҡбһҷ бһ¬бһ”бҹ’бһҡбһҖбҹ’бһҡбһҸбһёбһ—бһ¶бһ–бҹ” бһҠбһјбһ…бһ“бҹҒбҹҮ бһ”бһүбҹ’бһ…бһҹбһёбһӣ бһӮбһәбһҖбһ¶бһҡбһҡбһҖбҹ’бһҹбһ¶бһңбһ·бһ“бҹҗбһҷбһ’бһҳбҹҢбһҖбһҳбҹ’бһҡбһ·бһҸбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“ бҹҘ бһҷбҹүбһ¶бһ„бһҡбһ”бһҹбҹӢбһӮбҹ’бһҡбһ бһҹбҹ’бһҗбҹ”"
  }
];

    // бһҳбһ»бһҒбһ„бһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // бҹЎ. бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ Shuffle бһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһ бһ¶бһҸбҹӢ
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // бҹў. бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ Shuffle бһӣбҹҶбһҠбһ¶бһ”бҹӢбһҮбһҳбҹ’бһҡбһҫбһҹбһ…бһҳбҹ’бһӣбһҫбһҷбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбҹҶбһҺбһҪбһҡбһ“бһёбһҳбһҪбһҷбҹ—
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">бһҹбҹҶбһҺбһҪбһҡбһ‘бһё ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // бһҳбһ»бһҒбһ„бһ¶бһҡбһҖбҹӮбһ–бһ·бһ“бҹ’бһ‘бһ» бһ“бһ·бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("бһҹбһјбһҳбһ”бҹҶбһ–бҹҒбһүбһҲбҹ’бһҳбҹ„бҹҮ бһ“бһ·бһ„бһҗбҹ’бһ“бһ¶бһҖбҹӢбһҡбҹҖбһ“бһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "вң… <b>бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң!</b> бһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбҹ– " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "вқҢ <b>бһҳбһ·бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһ‘бҹҒ!</b> бһ…бһҳбҹ’бһӣбһҫбһҷбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбһәбҹ– " + item.ans + "<br>рҹ’Ў <b>бһҖбһ¶бһҡбһ–бһ“бҹ’бһҷбһӣбҹӢбҹ–</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `рҹҺ“ бһ”бҹҒбһҖбҹ’бһҒбһҮбһ“бҹ– ${name} | бһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${sClass} <br> рҹ“Ҡ бһӣбһ‘бҹ’бһ’бһ•бһӣбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бҹ– ${score} / ${shuffledQuestions.length} бһҹбҹҶбһҺбһҪбһҡ (бһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${Math.round((score/shuffledQuestions.length)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

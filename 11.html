    "q": "бһҸбһҫбһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһ–бһё В«бһӣбһҖбҹ’бһҒбһҺбҹҲ бҹӨ бһҷбҹүбһ¶бһ„бһ“бҹғбһ…бҹҒбһҸбһҹбһ·бһҖВ» (бһӣбһҖбҹ’бһҒбһҺбһ¶бһ‘бһ·бһ…бһҸбһ»бһҖбҹ’бһҖбҹҲ) бһҳбһ¶бһ“бһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһўбҹ’бһңбһёбһҖбҹ’бһ“бһ»бһ„бһ•бҹ’бһ“бҹӮбһҖбһңбһ·бһ”бһҹбҹ’бһҹбһ“бһ¶?",
    "opt": ["бһҠбһҫбһҳбҹ’бһ”бһёбһҷбһҖбһ‘бҹ…бһ‘бһ¶бһҖбҹӢбһ‘бһ¶бһҷбһҹбҹҶбһҺбһ¶бһ„", "бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһҷбһӣбҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһҗбһ¶ бһ…бҹҒбһҸбһҹбһ·бһҖбһ“бһёбһҳбһҪбһҷбҹ—бһҹбһ»бһ‘бҹ’бһ’бһҸбҹӮбһҮбһ¶бһҹбһ—бһ¶бһңбҹҲбһ–бһ·бһҸ бһҳбһ¶бһ“бһӣбһҖбҹ’бһҒбһҺбҹҲбһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҸбһҪбһҒбҹ’бһӣбһҪбһ“ бһҷбһҫбһ„ бһӮбҹҒ бһ¬бһ–бҹ’бһҡбһӣбһ№бһ„бһЎбһҫбһҷ (бһўбһ“бһҸбҹ’бһҸбһ¶)", "бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһ…бҹҒбҹҮбһҹбһјбһҸбҹ’бһҡбһ’бһҳбҹҢбһ”бһ¶бһ“бһңбҹӮбһ„бһҮбһ¶бһ„бһҳбһ»бһ“", "бһҠбһҫбһҳбҹ’бһ”бһёбһҮбһҪбһҷбһұбҹ’бһҷбһҡбҹҖбһ”бһ…бҹҶбһ–бһ·бһ’бһёбһ”бһ»бһҺбҹ’бһҷбһ”бһ¶бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң"],
    "ans": "бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһҷбһӣбҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһҗбһ¶ бһ…бҹҒбһҸбһҹбһ·бһҖбһ“бһёбһҳбһҪбһҷбҹ—бһҹбһ»бһ‘бҹ’бһ’бһҸбҹӮбһҮбһ¶бһҹбһ—бһ¶бһңбҹҲбһ–бһ·бһҸ бһҳбһ¶бһ“бһӣбһҖбҹ’бһҒбһҺбҹҲбһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҸбһҪбһҒбҹ’бһӣбһҪбһ“ бһҷбһҫбһ„ бһӮбҹҒ бһ¬бһ–бҹ’бһҡбһӣбһ№бһ„бһЎбһҫбһҷ (бһўбһ“бһҸбҹ’бһҸбһ¶)",
    "exp": "бһҖбһ¶бһҡбһҹбҹ’бһӮбһ¶бһӣбҹӢ бһӣбһҖбҹ’бһҒбһҺбҹҲ (бһӣбһҖбҹ’бһҒбһҺ) бһ‘бһёбһҸбһ¶бҹҶбһ„бһҖбһ¶бһҡбһ„бһ¶бһҡ (бһҡбһҹ) бһ•бһӣбһӣбҹҒбһ…бһ…бҹҒбһү (бһ”бһ…бҹ’бһ…бһ»бһ”бһҠбҹ’бһӢбһ¶бһ“) бһ“бһ·бһ„бһ бҹҒбһҸбһ»бһҮбһ·бһҸ (бһ”бһ‘бһҠбҹ’бһӢбһ¶бһ“) бһҡбһ”бһҹбҹӢбһ…бҹҒбһҸбһҹбһ·бһҖ бһҮбһҪбһҷбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһүбҹӮбһҖ бһҡбһјбһ”-бһ“бһ¶бһҳ бһҠбһ¶бһ…бҹӢбһ–бһёбһӮбҹ’бһ“бһ¶ бһ“бһ·бһ„бһғбһҫбһүбһ…бҹ’бһ”бһ¶бһҹбҹӢбһ–бһёбһҹбһ—бһ¶бһңбҹҲбһўбһ“бһҸбҹ’бһҸбһ¶бҹ”"
  }
];

    // бһҳбһ»бһҒбһ„бһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // бҹЎ. бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ Shuffle бһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһ бһ¶бһҸбҹӢ
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // бҹў. бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ Shuffle бһӣбҹҶбһҠбһ¶бһ”бҹӢбһҮбһҳбҹ’бһҡбһҫбһҹбһ…бһҳбҹ’бһӣбһҫбһҷбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбҹҶбһҺбһҪбһҡбһ“бһёбһҳбһҪбһҷбҹ—
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">бһҹбҹҶбһҺбһҪбһҡбһ‘бһё ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // бһҳбһ»бһҒбһ„бһ¶бһҡбһҖбҹӮбһ–бһ·бһ“бҹ’бһ‘бһ» бһ“бһ·бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("бһҹбһјбһҳбһ”бҹҶбһ–бҹҒбһүбһҲбҹ’бһҳбҹ„бҹҮ бһ“бһ·бһ„бһҗбҹ’бһ“бһ¶бһҖбҹӢбһҡбҹҖбһ“бһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "вң… <b>бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң!</b> бһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбҹ– " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "вқҢ <b>бһҳбһ·бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһ‘бҹҒ!</b> бһ…бһҳбҹ’бһӣбһҫбһҷбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбһәбҹ– " + item.ans + "<br>рҹ’Ў <b>бһҖбһ¶бһҡбһ–бһ“бҹ’бһҷбһӣбҹӢбҹ–</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `рҹҺ“ бһ”бҹҒбһҖбҹ’бһҒбһҮбһ“бҹ– ${name} | бһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${sClass} <br> рҹ“Ҡ бһӣбһ‘бҹ’бһ’бһ•бһӣбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бҹ– ${score} / ${shuffledQuestions.length} бһҹбҹҶбһҺбһҪбһҡ (бһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${Math.round((score/shuffledQuestions.length)*100)}%)<div style="justify-content: center; align-items: center;">
        <label style="visibility: hidden;">бһҸбҹҶбһҺбһ—бҹ’бһҮбһ¶бһ”бҹӢ</label> <a href="https://rosmakara71-hub.github.io/sil/" target="_blank" style="background: var(--primary); color: white; text-align: center; padding: 10px; border-radius: 5px; text-decoration: none; width: 80%; font-weight: bold; font-size: 0.9em;">рҹҢҗ бһҸбҹ’бһҡбһЎбһ”бҹӢбһ‘бҹ…бһ‘бҹҶбһ–бҹҗбһҡбһҠбһҫбһҳ</a>
    </div>`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

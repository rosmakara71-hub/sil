<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសាប្រឡងតេស្តសមត្ថភាព៖ សីលធម៌ និងពុទ្ធសាសនា (សីល៥)</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root { --primary: #273746; --accent: #7d6608; --success: #27ae60; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.7; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--accent); padding-bottom: 15px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #fcf3cf; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .student-info div { display: flex; flex-direction: column; }
        .student-info label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; background: #fff; border-radius: 8px; }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 1.05em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 4px; }
        .options label:hover { background: #fcf3cf; }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #219150; }
        .feedback { margin-top: 15px; padding: 15px; display: none; border-radius: 6px; font-size: 0.95em; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { text-align: center; margin-top: 30px; font-weight: bold; font-size: 1.4em; color: var(--primary); padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 វិញ្ញាសាតេស្ត៖ ចេតសិក<br>បង្កើតដោយgemini</h1>

    <div class="student-info">
        <div>
            <label for="sName">ឈ្មោះសិស្ស៖</label>
            <input type="text" id="sName" placeholder="តើអ្នកឈ្មោះអ្វី?">
        </div>
        <div>
            <label for="sClass">ថ្នាក់រៀន៖</label>
            <input type="text" id="sClass" placeholder="រៀននៅថ្នាក់ណា">
        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">បញ្ជូនវិញ្ញាសា និងពិនិត្យលទ្ធផល</button>
    <div id="summary"></div>
</div>

<script>
    // សំណួរអំពី៖ សីលរបស់គ្រហស្ថ
    const questions =[
  {
    "q": "តើក្រុមចេតសិកណាខ្លះដែលរួមបញ្ចូលក្នុង «បកិណ្ណកចេតសិក» (ចេតសិកដែលកើតរាយប៉ាយទៅតាមចិត្តផ្សេងៗ)?",
    "opt": ["ផស្សៈ សញ្ញា ចេតនា ឯកគ្គតា", "វិតក្កៈ វិចារៈ អធិមោក្ខ វីរិយៈ បីតិ ឆន្ទៈ", "សទ្ធា សតិ ហិរិ ឱតតប្បៈ", "លោភៈ ទោសៈ មោហៈ មានៈ"],
    "ans": "វិតក្កៈ វិចារៈ អធិមោក្ខ វីរិយៈ បីតិ ឆន្ទៈ",
    "exp": "បកិណ្ណកចេតសិក មាន ៦ នេះ គឺកើតក្នុងចិត្តជាកុសលផង អកុសលផង ប៉ុន្តែមិនមែនកើតជាមួយចិត្តគ្រប់សន្លឹកដូចសព្វចិត្តសាធារណចេតសិកឡើយ (កើតបានតែក្នុងចិត្តខ្លះ)។"
  },
  {
    "q": "សភាវៈដែល «លើកចិត្តឡើងកាន់អារម្មណ៍» ឬការគិតត្រិះរិះដំបូងទៅលើវត្ថុអ្វីមួយ ត្រូវនឹងតួនាទីរបស់ចេតសិកណា?",
    "opt": ["វិតក្កៈ (ការត្រិះរិះ)", "វិចារៈ (ការពិចារណា)", "ឆន្ទៈ (ការប៉ុនប៉ង)", "បីតិ (សេចក្តីអរ)"],
    "ans": "វិតក្កៈ (ការត្រិះរិះ)",
    "exp": "«វិតក្កចេតសិក» មានតួនាទីបោះចិត្ត ឬលើកចិត្តនិងសម្បយុត្តធម៌ទាំងឡាយឱ្យឆ្ពោះទៅរកអារម្មណ៍ ដូចជាការចាប់ផ្តើមគិតលើប្រធានលំហាត់មួយ។"
  },
  {
    "q": "បន្ទាប់ពីវិតក្កៈលើកចិត្តឡើងកាន់អារម្មណ៍ហើយ តើចេតសិកណាដែលធ្វើតួនាទី «ត្រដុស ឬអង្អែលអារម្មណ៍នោះឱ្យសព្វសាយ» (គិតស៊ីជម្រៅ)?",
    "opt": ["អធិមោក្ខ", "វិចារៈ", "វីរិយៈ", "ផស្សៈ"],
    "ans": "វិចារៈ",
    "exp": "«វិចារចេតសិក» មានលក្ខណៈត្រដុស ឬតាមពិនិត្យអារម្មណ៍នោះមិនឱ្យដាច់។ ប្រៀបដូចជាវិតក្កៈជាការវាយជួងដំបូង ឯវិចារៈគឺជាសូររលកសំឡេងជួងដែលលាន់រន្ថើនបន្តបន្ទាប់។"
  },
  {
    "q": "តើចេតសិកមួយណាដែលធ្វើតួនាទី «កាត់សេចក្តី ឬសម្រេចចិត្តយ៉ាងណែនត្អឹង» លើអារម្មណ៍ ដោយមិនរារែក?",
    "opt": ["វិចិកិច្ឆា", "អធិមោក្ខ", "ឯកគ្គតា", "មនសិការ"],
    "ans": "អធិមោក្ខ",
    "exp": "«អធិមោក្ខចេតសិក» គឺសភាវៈដាច់ខាត ឬការសន្និដ្ឋានដាច់ស្រេចលើអារម្មណ៍ មិនវង្វេងវង្វាន់ និងជាធម៌បដិបក្ខ (ផ្ទុយ) ត្រង់ៗជាមួយនឹង វិចិកិច្ឆា (សេចក្តីសង្ស័យ)។"
  },
  {
    "q": "សភាវៈដែលជា «សេចក្តីព្យាយាម, ភាពក្លាហានមិនរួញរា, និងការទប់ទល់មិនឱ្យចិត្តដកថយពីការងារ» ជារបស់ចេតសិកណា?",
    "opt": ["វីរិយៈ", "ឆន្ទៈ", "បីតិ", "ចេតនា"],
    "ans": "វីរិយៈ",
    "exp": "«វីរិយចេតសិក» គឺតួសេចក្តីព្យាយាម (Energy/Effort)។ កាលណាមានវីរិយៈ វានឹងជួយកម្ចាត់ភាពខ្ជិលច្រអូស និងជួយគាំទ្រឱ្យកិច្ចការទាំងឡាយបានសម្រេចជោគជ័យ។"
  },
  {
    "q": "នៅពេលដែលយើងធ្វើការងារអ្វីមួយបានសម្រេច រួចកើត «សេចក្តីឆ្អែតចិត្ត, រំភើបញញឹមញញែម» តើត្រូវនឹងចេតសិកណា?",
    "opt": ["វេទនា", "បីតិ", "ឆន្ទៈ", "បស្សទ្ធិ"],
    "ans": "បីតិ",
    "exp": "«បីតិចេតសិក» គឺសភាវៈរីករាយ ឆ្អែតកាយឆ្អែតចិត្ត ឬភាពរំភើបញាប់ញ័រដោយកុសលធម៌ (មិនមែនជាតណ្ហាលោភលន់ឡើយ)។"
  },
  {
    "q": "តើពាក្យ «ឆន្ទៈ» នៅក្នុងចេតសិក បកស្រង់តាមបរមត្ថធម៌មានន័យចំដូចម្តេច?",
    "opt": ["សេចក្តីលោភលន់ចង់បានរបស់គេ", "សេចក្តីប៉ុនប៉ង, បំណងប្រាថ្នាចង់ធ្វើ ឬចង់បានលទ្ធផល (Desire to act)", "ការខឹងសម្បារនឹងមិត្តភក្តិ", "ការយល់សប្តិឃើញរឿងល្អៗ"],
    "ans": "សេចក្តីប៉ុនប៉ង, បំណងប្រាថ្នាចង់ធ្វើ ឬចង់បានលទ្ធផល (Desire to act)",
    "exp": "«ឆន្ទចេតសិក» គឺសភាវៈប៉ុនប៉ងធ្វើ កាលណាមានឆន្ទៈជាធំ វានឹងដឹកនាំចិត្តឱ្យផ្ដោតទៅលើគោលដៅនោះ រហូតសម្រេចបាន (ដូចជាឆន្ទៈក្នុងការរៀនសូត្រ)។"
  },
  {
    "q": "តើអកុសលចេតសិកណាដែលជាមេខ្លោងធំជាងគេ ចូលកើតក្នុងអកុសលចិត្ត «គ្រប់សន្លឹកទាំង ១៤» ដោយខានមិនបាន?",
    "opt": ["លោភៈ", "ទោសៈ", "មោហៈ (និងក្រុមមោចតុកៈ)", "ឥស្សា"],
    "ans": "មោហៈ (និងក្រុមមោចតុកៈ)",
    "exp": "«មោហចេតសិក» គឺភាពមិនដឹងពិត ឬសេចក្តីវង្វេង។ ឱ្យតែចិត្តនោះជាអកុសល (ចិត្តអាក្រក់) គឺច្បាស់ជាមានមោហៈនៅ پួនឡំជាមួយជានិច្ច ព្រោះបើមិនវង្វេង គឺមនុស្សមិនហ៊ានធ្វើអាក្រក់ឡើយ។"
  },
  {
    "q": "សភាវៈដែល «មិនខ្មាសអៀនចំពោះអំពើទុច្ចរិត» (ទោះធ្វើខុសច្បាប់ ឬខុសធម៌ក៏នៅតែហ៊ាន) ត្រូវនឹងចេតសិកណា?",
    "opt": ["អហិរិកៈ", "អនោត្តប្បៈ", "ឧទ្ធច្ចៈ", "មោហៈ"],
    "ans": "អហិរិកៈ",
    "exp": "«អហិរិកចេតសិក» គឺភាពមិនខ្មាសបាប ប្រៀបដូចជាជ្រូកដែលមិនស្អប់ខ្ពើម ឬមិនខ្មាសនឹងការដេកត្រាំក្នុងភក់ជ្រាំដ៏កខ្វក់។"
  },
  {
    "q": "សភាវៈដែល «មិនខ្លាចរអានឹងផលវិបាកនៃបាបកម្ម» (ហ៊ានបំពានសីលដោយមិនខ្វល់ពីទោសទណ្ឌ) ជារបស់ចេតសិកណា?",
    "opt": ["អនោត្តប្បៈ", "អហិរិកៈ", "មានៈ", "ទិដ្ឋិ"],
    "ans": "អនោត្តប្បៈ",
    "exp": "«អនោត្តប្បចេតសិក» គឺភាពមិនខ្លាចបាប ហ៊ានប្រព្រឹត្តអំពើថោកទាបគ្រប់យ៉ាង ប្រៀបដូចជាសត្វមមាចដែលហើរចូលភ្លើងដោយមិនខ្លាចស្លាប់។"
  },
  {
    "q": "តើចេតសិកមួយណាដែលមានលក្ខណៈ «ត្រជាក់, មិនខឹង, មិនគុំកួន និងមានចិត្តអត់ធ្មត់ (ខន្តី)» ពេលជួបអារម្មណ៍មិនល្អ?",
    "opt": ["អឡោភៈ", "អទោសៈ", "អមោហៈ", "តត្រមជ្ឈត្តតា"],
    "ans": "អទទោសៈ",
    "exp": "«អទោសចេតសិក» គឺសភាវៈមិនថ្នាំងថ្នាក់ចិត្ត ឬមិនខឹង ដែលជាឫសគល់នៃ «មេត្តាធម៌» ជួយឱ្យចិត្តទន់ភ្លន់ និងចេះអភ័យទោស។"

    // មុខងារសម្រាប់ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // ១. ធ្វើការ Shuffle លំដាប់លំហាត់
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // ២. ធ្វើការ Shuffle លំដាប់ជម្រើសចម្លើយនៅក្នុងសំណួរនីមួយៗ
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">សំណួរទី ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // មុខងារកែពិន្ទុ និងបង្ហាញដំណោះស្រាយ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់រៀនរបស់សិស្សជាមុនសិន!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "✅ <b>ត្រឹមត្រូវ!</b> ដំណោះស្រាយ៖ " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "❌ <b>មិនត្រឹមត្រូវទេ!</b> ចម្លើយដែលត្រូវគឺ៖ " + item.ans + "<br>💡 <b>ការពន្យល់៖</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `🎓 បេក្ខជន៖ ${name} | ថ្នាក់៖ ${sClass} <br> 📊 លទ្ធផលទទួលបាន៖ ${score} / ${shuffledQuestions.length} សំណួរ (ចំណាត់ថ្នាក់៖ ${Math.round((score/shuffledQuestions.length)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសាប្រឡងតេស្តសមត្ថភាព៖ សីលធម៌ និងពុទ្ធសាសនា (សីល៥)</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root { --primary: #273746; --accent: #7d6608; --success: #27ae60; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.7; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--accent); padding-bottom: 15px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #fcf3cf; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .student-info div { display: flex; flex-direction: column; }
        .student-info label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; background: #fff; border-radius: 8px; }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 1.05em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 4px; }
        .options label:hover { background: #fcf3cf; }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #219150; }
        .feedback { margin-top: 15px; padding: 15px; display: none; border-radius: 6px; font-size: 0.95em; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { text-align: center; margin-top: 30px; font-weight: bold; font-size: 1.4em; color: var(--primary); padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 វិញ្ញាសាតេស្ត៖ សីលរបស់គ្រហស្ថ<br>បង្កើតដោយgemini</h1>

    <div class="student-info">
        <div>
            <label for="sName">ឈ្មោះសិស្ស៖</label>
            <input type="text" id="sName" placeholder="តើអ្នកឈ្មោះអ្វី?">
        </div>
        <div>
            <label for="sClass">ថ្នាក់រៀន៖</label>
            <input type="text" id="sClass" placeholder="រៀននៅថ្នាក់ណា">
        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">បញ្ជូនវិញ្ញាសា និងពិនិត្យលទ្ធផល</button>
    <div id="summary"></div>
</div>

<script>
    // សំណួរអំពី៖ សីលរបស់គ្រហស្ថ
    const questions =[
  {
    "q": "ការមិនបៀតបៀនជីវិតអ្នកដទៃ តាមរយៈការមិនប្រើហិង្សា និងការគិតគូរដល់សុវត្ថិភាពសង្គម ឆ្លុះបញ្ចាំងពីគុណធម៌គូកន (ធម៌ពាក់ព័ន្ធ) នៃសីលទី១ មួយណា?",
    "opt": ["មេត្តាករុណា", "សច្ចៈ", "សម្មាអាជីវៈ", "សន្និដ្នាន"],
    "ans": "មេត្តាករុណា",
    "exp": "សីលទី១ (វៀរចាកការសម្លាប់) មានគុណធម៌គូកនគឺ «មេត្តាករុណា» ពោលគឺការស្រឡាញ់រាប់អាន និងការចង់ជួយសង្គ្រោះជីវិតមនុស្សសត្វឱ្យរួចផុតពីទុក្ខ។"
  },
  {
    "q": "តើការរក្សាសីលទី២ (អទិន្នាទានា) ជួយបណ្តុះនូវគុណសម្បត្តិអ្វីខ្លះក្នុងការប្រកបមុខរបរប្រចាំថ្ងៃ?",
    "opt": ["ការចង់បានរបស់គេដោយមិនបាច់ប្រឹង", "ភាពស្មោះត្រង់ និងការប្រកបរបរចិញ្ចឹមជីវិតដោយសុច្ចរិត (សម្មាអាជីវៈ)", "ការចេះរកល្បិចកិបកេងចំណេញពីអតិថិជន", "ការរង់ចាំតែលាភសំណាងបន់ស្រន់"],
    "ans": "ភាពស្មោះត្រង់ និងការប្រកបរបរចិញ្ចឹមជីវិតដោយសុច្ចរិត (សម្មាអាជីវៈ)",
    "exp": "សីលទី២ ជួយឱ្យយើងមិនវៀចវេរ មិនកេងប្រវ័ញ្ច និងមិនបំផ្លាញទំនុកចិត្តដៃគូជំនួញ ដែលជាមូលដ្ឋាននៃ «សម្មាអាជីវៈ» (ការចិញ្ចឹមជីវិតត្រឹមត្រូវ)។"
  },
  {
    "q": "ពាក្យថា «សទារសន្តោស» នៅក្នុងសីលធម៌គ្រួសារ មានន័យដូចម្តេច?",
    "opt": ["ការពេញចិត្ត និងស្មោះត្រង់តែចំពោះគូស្រករ (ប្តី ឬប្រពន្ធ) របស់ខ្លួន", "ការចង់បានគូស្រករច្រើនដើម្បីបង្កើនកិត្តិយស", "ការរស់នៅម្នាក់ឯងមិនព្រមយកប្តីឬប្រពន្ធ", "ការដើរលេងកម្សាន្តសប្បាយដោយគ្មានការទទួលខុសត្រូវ"],
    "ans": "ការពេញចិត្ត និងស្មោះត្រង់តែចំពោះគូស្រករ (ប្តី ឬប្រពន្ធ) របស់ខ្លួន",
    "exp": "«សទារសន្តោស» (សទារសន្តោសៈ) គឺការសន្តោសចិត្ត ឬការស្កប់ស្កល់ត្រឹមតែគូស្រករស្របច្បាប់របស់ខ្លួន ដែលជាគុណធម៌គាំទ្រដល់សីលទី៣ (កាមេសុមិច្ឆាចារា)។"
  },
  {
    "q": "តើពាក្យ «មុសា» នៅក្នុងសិក្ខាបទទី៤ តាមន័យចង្អៀតបំផុត សំដៅលើទង្វើបែបណា?",
    "opt": ["ការនិយាយពាក្យពិតដែលនាំឱ្យគេឈ្លោះគ្នា", "ការនិយាយកុហក ដឹងថាខុសហើយនៅតែនិយាយបំភ័ន្ត", "ការនិយាយលេងសើចតាមបែបកំប្លែង", "ការនិយាយស្ដីយឺតៗមិនច្បាស់លាស់"],
    "ans": "ការនិយាយកុហក ដឹងថាខុសហើយនៅតែនិយាយបំភ័ន្ត",
    "exp": "«មុសា» សំដៅលើការនិយាយកុហក បំភ័ន្តការពិត ដោយមានចេតនាចង់បោកប្រាស់ ឬធ្វើឱ្យអ្នកដទៃខូចប្រយោជន៍។"
  },
  {
    "q": "តើការប្រើប្រាស់ពាក្យសម្ដីបែបណា ដែលចាត់ទុកថាជាការបំពានដល់ «វាចាសុច្ចរិត» ក្នុងស្មារតីសីលទី៤?",
    "opt": ["ពាក្យកុហក ពាក្យញុះញង់ ពាក្យអសុរោះ និងពាក្យរោយរាយគ្មានប្រយោជន៍", "ពាក្យអប់រំ ពាក្យទូន្មាន និងពាក្យពន្យល់ហេតុផល", "ពាក្យពេចន៍កំណាព្យ និងអក្សរសិល្ប៍", "ការនិយាយភាសាបរទេស"],
    "ans": "ពាក្យកុហក ពាក្យញុះញង់ ពាក្យអសុរោះ និងពាក្យរោយរាយគ្មានប្រយោជន៍",
    "exp": "វាចាទុច្ចរិតមាន ៤ យ៉ាងគឺ៖ កុហក (មុសា), ញុះញង់ (បិសុណាវាចា), អសុរោះ (ផរុសវាចា), និងរោយរាយគ្មានប្រយោជន៍ (សម្ផប្បលាបៈ) ដែលសីលទី៤ ណែនាំឱ្យវៀរចាកទាំងអស់។"
  },
  {
    "q": "គ្រឿងស្រវឹង និងសារធាតុញៀន ត្រូវបានព្រះពុទ្ធសាសនាហៅថាជា «មជ្ជប្បមាទដ្ឋានា»។ តើឃ្លានេះមានន័យដូចម្តេច?",
    "opt": ["ជាទីតាំងសម្រាប់លក់ដូរទំនិញគ្រប់ប្រភេទ", "ជាហេតុ ឬជាទីតាំងបង្កើតនូវសេចក្តីប្រមាទ (ការបាត់បង់ស្មារតីរំលឹកខ្លួន)", "ជាថ្នាំទិព្វជួយឱ្យមានអាយុយឺនយូរ", "ជាភេសជ្ជៈសម្រួលដល់ការសិក្សា"],
    "ans": "ជាហេតុ ឬជាទីតាំងបង្កើតនូវសេចក្តីប្រមាទ (ការបាត់បង់ស្មារតីរំលឹកខ្លួន)",
    "exp": "មជ្ជប្បមាទដ្ឋានា (មជ្ជ + បមាទ + ដ្ឋាន) មានន័យថា សារធាតុដែលនាំឱ្យស្រវឹង និងជាហេតុបង្កើតនូវសេចក្តីប្រមាទ ធ្វើឱ្យបាត់ការចងចាំ និងសតិសម្បជញ្ញៈ។"
  },
  {
    "q": "បុគ្គលម្នាក់ចាក់ទឹកអាស៊ីតសម្លាប់មេរោគ ឬសត្វល្អិតដែលបំផ្លាញដំណាំក្នុងចម្ការ តើទង្វើនេះខុសនឹងគោលការណ៍សីលទី១ ដែរឬទេ?",
    "opt": ["មិនខុសទាល់តែសោះ ព្រោះសត្វល្អិតមិនមែនជាសត្វមានជីវិតទេ", "ខុស ព្រោះសីលទី១ ហាមដាច់ខាតលើការសម្លាប់រាល់សត្វមានជីវិត (មានប្រាណ) ដោយចេតនា", "ខុស លុះត្រាតែប្រើកាំបិតសម្លាប់ទើបខុស", "មិនខុសទេ បើធ្វើឡើងនៅពេលថ្ងៃត្រង់"],
    "ans": "ខុស ព្រោះសីលទី១ ហាមដាច់ខាតលើការសម្លាប់រាល់សត្វមានជីវិត (មានប្រាណ) ដោយចេតនា",
    "exp": "ក្នុងវិន័យសីល៥ ឱ្យតែសត្វនោះមានជីវិត (មានដង្ហើមរស់នៅ) ហើយបុគ្គលនោះមានចេតនាសម្លាប់ និងបានធ្វើសកម្មភាពរហូតសត្វនោះស្លាប់ គឺសុទ្ធតែដាច់សីលទី១ ទាំងអស់ ទោះជាសត្វតូចឬធំ។"
  },
  {
    "q": "ការរើសបានរបស់គេដែលជ្រុះបាត់ ហើយយកទៅធ្វើជាកម្មសិទ្ធិផ្ទាល់ខ្លួនដោយលាក់បាំងមិនប្រកាសរកម្ចាស់ តើចាត់ចូលក្នុងសីលធម៌ខុសឆ្គងមួយណា?",

    // មុខងារសម្រាប់ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // ១. ធ្វើការ Shuffle លំដាប់លំហាត់
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // ២. ធ្វើការ Shuffle លំដាប់ជម្រើសចម្លើយនៅក្នុងសំណួរនីមួយៗ
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">សំណួរទី ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // មុខងារកែពិន្ទុ និងបង្ហាញដំណោះស្រាយ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់រៀនរបស់សិស្សជាមុនសិន!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "✅ <b>ត្រឹមត្រូវ!</b> ដំណោះស្រាយ៖ " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "❌ <b>មិនត្រឹមត្រូវទេ!</b> ចម្លើយដែលត្រូវគឺ៖ " + item.ans + "<br>💡 <b>ការពន្យល់៖</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `🎓 បេក្ខជន៖ ${name} | ថ្នាក់៖ ${sClass} <br> 📊 លទ្ធផលទទួលបាន៖ ${score} / ${shuffledQuestions.length} សំណួរ (ចំណាត់ថ្នាក់៖ ${Math.round((score/shuffledQuestions.length)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសាប្រឡងតេស្តសមត្ថភាព៖ សីលធម៌ និងពុទ្ធសាសនា (សីល៥)</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root { --primary: #273746; --accent: #7d6608; --success: #27ae60; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.7; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--accent); padding-bottom: 15px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #fcf3cf; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .student-info div { display: flex; flex-direction: column; }
        .student-info label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; background: #fff; border-radius: 8px; }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 1.05em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 4px; }
        .options label:hover { background: #fcf3cf; }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #219150; }
        .feedback { margin-top: 15px; padding: 15px; display: none; border-radius: 6px; font-size: 0.95em; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { text-align: center; margin-top: 30px; font-weight: bold; font-size: 1.4em; color: var(--primary); padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 វិញ្ញាសាតេស្ត៖ ចេតសិក<br>បង្កើតដោយgemini</h1>

    <div class="student-info">
        <div>
            <label for="sName">ឈ្មោះសិស្ស៖</label>
            <input type="text" id="sName" placeholder="តើអ្នកឈ្មោះអ្វី?">
        </div>
        <div>
            <label for="sClass">ថ្នាក់រៀន៖</label>
            <input type="text" id="sClass" placeholder="រៀននៅថ្នាក់ណា">
        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">បញ្ជូនវិញ្ញាសា និងពិនិត្យលទ្ធផល</button>
    <div id="summary"></div>
</div>

<script>
    // សំណួរអំពី៖ សីលរបស់គ្រហស្ថ
    const questions =[
  {
    "q": "តើចេតសិកមួយណាដែលជា «មេខ្លោងធំ» ក្នុងផ្នែកអកុសល ធ្វើหน้าที่បិទបាំងការពិត មិនឱ្យចិត្តឃើញសច្ចធម៌ (អរិយសច្ច)?",
    "opt": ["ទិដ្ឋិ", "មោហៈ", "វិចិកិច្ឆា", "ឧទ្ធច្ចៈ"],
    "ans": "មោហៈ",
    "exp": "«មោហចេតសិក» (ឬអវិជ្ជា) មានលក្ខណៈងងឹតសូន្យឈឹង ធ្វើหน้าที่បិទបាំងលាក់កំបាំងតថភាពពិតនៃរូបនាម មិនឱ្យចិត្តស្គាល់ខុសត្រូវ បុណ្យបាប ឬកម្មផលឡើយ។"
  },
  {
    "q": "សភាវៈដែល «រំភើបញាប់ញ័រក្នុងកុសលធម៌» មាន ៥ កម្រិត (ដូចជា ខុទ្ទិកាបីតិ ឱលង្ការិកាបីតិ ឧព្វេគាបីតិ) ជារបស់ចេតសិកណា?",
    "opt": ["ឆន្ទៈ", "បីតិ", "វេទនា", "បស្សទ្ធិ"],
    "ans": "បីតិ",
    "exp": "«បីតិចេតសិក» (សេចក្តីឆ្អែតចិត្ត) អាចវិវត្តទៅជាកម្លាំងធំធេងក្នុងសមាធិ ដែលចែកចេញជា ៥ ថ្នាក់ ចាប់ពីការព្រឺរោមបន្តិចបន្តួច រហូតដល់សភាវៈខ្លួនស្រាលហោះបាន។"
  },
  {
    "q": "តើចេតសិកមួយណាដែលធ្វើតួនាទី «សម្រេចចិត្តជ្រើសរើសអារម្មណ៍» ប្រៀបដូចជាមេការកាត់ក្តី បញ្ឈប់ភាពរារែកទាំងពួង?",
    "opt": ["វិចារៈ", "អធិមោក្ខ", "មនសិការ", "ចេតនា"],
    "ans": "អធិមោក្ខ",
    "exp": "«អធិមោក្ខចេតសិក» មានមុខងារចាក់សោ ឬបោះត្រាសម្រេចចិត្តលើអារម្មណ៍មួយ ដាច់ខាតមិនរេរា ផ្ទុយស្រឡះពីវិចិកិច្ឆា (សេចក្តីសង្ស័យ)។"
  },
  {
    "q": "តើពាក្យថា «សព្វចិត្តសាធារណចេតសិក» មានន័យជ្រៅជ្រះដួចម្តេចក្នុងលំនាំចិត្តវិទ្យាព្រះពុទ្ធសាសនា?",
    "opt": ["ជាចេតសិកដែលកើតបានតែក្នុងចិត្តល្អៗ", "ជាគ្រឿងផ្សំគ្រឹះ ៧ យ៉ាង ដែលត្រូវតែមានមុខក្នុង «ចិត្តគ្រប់ដួងទាំងអស់» ដោយគ្មានលើកលែង", "ជាចេតសិកដែលកើតតែពេលមានរឿងរំភើប", "ជាធម៌របស់ព្រះអរហន្តតែមួយគត់"],
    "ans": "ជាគ្រឿងផ្សំគ្រឹះ ៧ យ៉ាង ដែលត្រូវតែមានមុខក្នុង «ចិត្តគ្រប់ដួងទាំងអស់» ដោយគ្មានលើកលែង",
    "exp": "ឱ្យតែមាន «ចិត្ត» កើតឡើងដឹងអារម្មណ៍ ទោះបីជាចិត្តថ្នាក់ទាប (នរក) ឬថ្នាក់ខ្ពស់ (ឈាន) គឺត្រូវតែមាន ផស្សៈ វេទនា សញ្ញា ចេតនា ឯកគ្គតា ជីវិតិន្រ្ទិយ និងមនសិការ ចូលរួមជានិច្ច។"
  },
  {
    "q": "សភាវៈដែល «រឹងត្អឹង ប្រកាន់វណ្ណៈ គិតថាខ្លួនគ្របដណ្តប់ ឬពូកែជាងអ្នកដទៃ» ត្រូវនឹងអកុសលចេតសិកណា?",
    "opt": ["ទិដ្ឋិ", "មានៈ", "មច្ឆរិយៈ", "ទោសៈ"],
    "ans": "មានៈ",
    "exp": "«មានចេតសិក» (សេចក្តីប្រកាន់ខ្លួន/傲慢) ធ្វើឱ្យចិត្តប៉ោងឡើង វាយតម្លៃខ្លួនខ្ពស់ហួសហេតុ និងមើលងាយអ្នកដទៃ ដែលជាឧបសគ្គធំក្នុងការរៀនសូត្រ និងការអនុវត្តធម៌។"
  },
  {
    "q": "តើ «អទោសចេតសិក» (សេចក្តីមិនខឹង) កាលណាមានកម្លាំងខ្លាំងក្លាឡើង នឹងបង្ហាញចេញជាគុណធម៌កំពូលមួយណា?",
    "opt": ["មេត្តាធម៌", "ករុណាធម៌", "មុទិតាធម៌", "សទ្ធាធម៌"],
    "ans": "មេត្តាធម៌",
    "exp": "«អទោសៈ» ជាឫសគល់នៃសេចក្តីល្អ។ លក្ខណៈមិនប្រទូស្ត មិនស្អប់ មិនគុំកួនរបស់វា គឺជារូបរាងពិតនៃ «មេត្តា» (សេចក្តីស្រឡាញ់រាប់អានដ៏បរិសុទ្ធចំពោះសត្វលោក)។"
  },
  {
    "q": "តើការផ្សំគ្នារវាង «ថីនៈ និង មិទ្ធៈ» (ថីនមិទ្ធៈ) បង្កើតជាលទ្ធផលអវិជ្ជមានអ្វីខ្លះដល់ចិត្ត?",
    "opt": ["ធ្វើឱ្យចិត្តរាយមាយចង់តែដើរលេង", "ធ្វើឱ្យចិត្ត និងចេតសិកគូកនរួញរា ស្ពឹកស្រពន់ ងងុយដេក និងបាត់បង់ថាមពលក្នុងការធ្វើការ", "ធ្វើឱ្យកើតសេចក្តីខឹងក្រោធខ្លាំង", "ធ្វើឱ្យយល់ខុសពីច្បាប់ធម្មជាតិ"],
    "ans": "ធ្វើឱ្យចិត្ត និងចេតសិកគូកនរួញរា ស្ពឹកស្រពន់ ងងុយដេក និងបាត់បង់ថាមពលក្នុងការធ្វើការ",
    "exp": "«ថីនៈ» ធ្វើឱ្យចិត្តរួញរាស្ពឹក ឯ «មិទ្ធៈ» ធ្វើឱ្យចេតសិកគូកនងងុយឈ្លី។ ធម៌ទាំងពីរនេះរួមគ្នាបង្កើតជា នីវរណធម៌ រារាំងមិនឱ្យសម្រេចសមាធិ ឬការងារផ្សេងៗ។"
  },
  {
    "q": "តើចេតសិកគូណាដែលជួយកម្ចាត់ «ភាពរឹងរូស មានៈប្រកាន់ខ្លួន» ធ្វើឱ្យចិត្តមានសភាវៈទន់ភ្លន់ ងាយប្រដៅ?",
    "opt": ["កាយលហុតា និងចិត្តលហុតា", "កាយមុទុតា និងចិត្តមុទុតា", "កាយបស្សទ្ធិ និងចិត្តបស្សទ្ធិ", "កាយឧជុកតា និងចិត្តឧជុកតា"],
    "ans": "កាយមុទុតា និងចិត្តមុទុតា",
    "exp": "«មុទុតា» គឺភាពទន់ (Pliancy)។ កាយមុទុតា និងចិត្តមុទុតា ធ្វើឱ្យនាមធម៌ទន់ភ្លន់ លះបង់ភាពរឹងត្អឹង ដែលងាយស្រួលក្នុងការបង្អោនទៅរកកុសលធម៌។"
  },
  {
    "q": "តើចេតសិកគូណាដែលមានមុខងារ «កម្ចាត់ភាពពុតត្បុត មាយា និងការលាក់ពុតបោកប្រាស់» ញាំងចិត្តឱ្យត្រង់ស្មោះ?",
    "opt": ["កាយកម្មញ្ញតា និងចិត្តកម្មញ្ញតា", "កាយឧជុកតា និងចិត្តឧជុកតា", "កាយបាគុញ្ញតា និងចិត្តបាគុញ្ញតា", "សម្មាវាចា និងសម្មាកម្មន្តៈ"],
    "ans": "កាយឧជុកតា និងចិត្តឧជុកតា",
    "exp": "«ឧជុកតា» គឺភាពត្រង់ (Rectitude)។ កាយឧជុកតា (ចេតសិកត្រង់) និងចិត្តឧជុកតា (ចិត្តត្រង់) ជួយឱ្យបុគ្គលនោះមានសេចក្តីស្មោះត្រង់ មិនវៀចវេរវែកញែករកល្បិចកល។"
  },
  {
    "q": "តើការផ្អាក ឬវៀរចាកពីអំពើអាក្រក់ដោយសារបាន «សន្យា ឬសមាទានសីលទុកមុន» (ដូចជាការដើរដកសីល ៥ នៅវត្ត) ហៅថាវិរតីប្រភេទណា?",

    // មុខងារសម្រាប់ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // ១. ធ្វើការ Shuffle លំដាប់លំហាត់
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // ២. ធ្វើការ Shuffle លំដាប់ជម្រើសចម្លើយនៅក្នុងសំណួរនីមួយៗ
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">សំណួរទី ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // មុខងារកែពិន្ទុ និងបង្ហាញដំណោះស្រាយ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់រៀនរបស់សិស្សជាមុនសិន!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "✅ <b>ត្រឹមត្រូវ!</b> ដំណោះស្រាយ៖ " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "❌ <b>មិនត្រឹមត្រូវទេ!</b> ចម្លើយដែលត្រូវគឺ៖ " + item.ans + "<br>💡 <b>ការពន្យល់៖</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `🎓 បេក្ខជន៖ ${name} | ថ្នាក់៖ ${sClass} <br> 📊 លទ្ធផលទទួលបាន៖ ${score} / ${shuffledQuestions.length} សំណួរ (ចំណាត់ថ្នាក់៖ ${Math.round((score/shuffledQuestions.length)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
